services:
  aiswakepy:
    build: .
    ports:
      - "8050:8050"
    environment:
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
      GUNICORN_TIMEOUT: "300"
    volumes:
      - aiswakepy-data:/app/data
      - aiswakepy-output:/app/output
    restart: unless-stopped

volumes:
  aiswakepy-data:
  aiswakepy-output:
