services:
  aiswakepy:
    build: .
    command: .venv/bin/python dash_app.py
    environment:
      DATA_ROOT: /data
      UPLOAD_FOLDER: /data/uploads
    ports:
      - "8050:8050"
    volumes:
      - ./data:/data
      - ./output:/app/output
      - ./server_config.json:/app/server_config.json:ro
    restart: unless-stopped
